<!doctype html>
<meta charset="utf-8">
<link rel="stylesheet" href="../src/public/css/styles.css">
<div id="tree" class="tree"></div>
<div id="ctxMenu" hidden></div>
<div id="iconPicker" hidden></div>
<script>
const calls = [];
const rootTree = {
    noteId: 'root',
    children: [
        {
            relationId: 'r-parent',
            noteId: 'parent',
            title: 'Parent',
            type: 'text',
            childCount: 2,
            isExpanded: true,
            children: [
                {
                    relationId: 'r-child-a',
                    noteId: 'child-a',
                    title: 'Child A',
                    type: 'text',
                    childCount: 0,
                    isExpanded: false,
                    children: [],
                },
                {
                    relationId: 'r-child-b',
                    noteId: 'child-b',
                    title: 'Child B',
                    type: 'text',
                    childCount: 0,
                    isExpanded: false,
                    children: [],
                },
            ],
        },
        {
            relationId: 'r-source',
            noteId: 'source',
            title: 'Source',
            type: 'text',
            childCount: 0,
            isExpanded: false,
            children: [],
        },
        {
            relationId: 'r-source-parent',
            noteId: 'source-parent',
            title: 'Source Parent',
            type: 'text',
            childCount: 1,
            isExpanded: true,
            children: [
                {
                    relationId: 'r-source-child',
                    noteId: 'source-child',
                    title: 'Source Child',
                    type: 'text',
                    childCount: 0,
                    isExpanded: false,
                    children: [],
                },
            ],
        },
    ],
};
window.Api = {
    getTree: async () => rootTree,
    moveNode: async body => calls.push(['move', body]),
    reorderSiblings: async body => calls.push(['reorder', body]),
    setExpanded: async () => {},
    updateNote: async () => {},
};
</script>
<script src="../src/public/js/tree.js"></script>
<script>
(async () => {
    function assert(condition, message) {
        if (!condition) throw new Error(message);
    }

    function dragEvent(type, x, y, dataTransfer) {
        return new DragEvent(type, {
            bubbles: true,
            cancelable: true,
            clientX: x,
            clientY: y,
            dataTransfer,
        });
    }

    function row(noteId) {
        const el = document.querySelector(`.tree-row[data-note-id="${noteId}"]`);
        assert(el, `${noteId} row exists`);
        return el;
    }

    function lineLeft() {
        const line = document.querySelector('.tree-drop-line:not([hidden])');
        assert(line, 'drop line is visible');
        return Number.parseFloat(line.style.left);
    }

    try {
        await TreeView.reload();
        const parent = row('parent');
        const source = row('source');
        const rect = parent.getBoundingClientRect();
        const treeRect = document.getElementById('tree').getBoundingClientRect();
        const leftSideX = treeRect.left + treeRect.width * 0.25;
        const rightSideX = treeRect.left + treeRect.width * 0.75;

        let dt = new DataTransfer();
        source.dispatchEvent(dragEvent('dragstart', 0, 0, dt));
        parent.dispatchEvent(dragEvent('dragover', leftSideX, rect.bottom - 2, dt));
        assert(parent.classList.contains('drop-after'), 'unindented bottom of parent drops after parent');
        const parentLineLeft = lineLeft();
        parent.dispatchEvent(dragEvent('drop', leftSideX, rect.bottom - 2, dt));
        await new Promise(resolve => setTimeout(resolve, 0));
        assert(calls[0][1].newParentId === 'root', 'sibling drop keeps root parent');
        assert(calls[1][1].relationIds.join(',') === 'r-parent,r-source,r-source-parent', 'sibling drop reorders after parent');

        calls.length = 0;
        source.dispatchEvent(new DragEvent('dragend', { bubbles: true }));
        await TreeView.reload();

        dt = new DataTransfer();
        row('source').dispatchEvent(dragEvent('dragstart', 0, 0, dt));
        row('parent').dispatchEvent(dragEvent('dragover', rightSideX, rect.bottom - 2, dt));
        assert(row('parent').classList.contains('drop-first-child'), 'indented bottom of parent drops as first child');
        assert(lineLeft() === parentLineLeft + 16, 'child line starts one level deeper');
        row('parent').dispatchEvent(dragEvent('drop', rightSideX, rect.bottom - 2, dt));
        await new Promise(resolve => setTimeout(resolve, 0));
        assert(calls[0][1].newParentId === 'parent', 'first-child drop moves under parent');
        assert(calls[1][1].relationIds.join(',') === 'r-source,r-child-a,r-child-b', 'first-child drop reorders above existing children');

        calls.length = 0;
        row('source').dispatchEvent(new DragEvent('dragend', { bubbles: true }));
        await TreeView.reload();

        const childRect = row('child-a').getBoundingClientRect();
        dt = new DataTransfer();
        row('source').dispatchEvent(dragEvent('dragstart', 0, 0, dt));
        row('child-a').dispatchEvent(dragEvent('dragover', leftSideX, childRect.top + 2, dt));
        assert(row('child-a').classList.contains('drop-parent-after'), 'unindented top of first child drops after parent');
        assert(lineLeft() === parentLineLeft, 'first-child top line can unindent to parent depth');
        row('child-a').dispatchEvent(dragEvent('drop', leftSideX, childRect.top + 2, dt));
        await new Promise(resolve => setTimeout(resolve, 0));
        assert(calls[0][1].newParentId === 'root', 'unindented first-child gap keeps root parent');
        assert(calls[1][1].relationIds.join(',') === 'r-parent,r-source,r-source-parent', 'unindented first-child gap reorders after parent');

        calls.length = 0;
        row('source').dispatchEvent(new DragEvent('dragend', { bubbles: true }));
        await TreeView.reload();

        dt = new DataTransfer();
        row('source').dispatchEvent(dragEvent('dragstart', 0, 0, dt));
        row('child-a').dispatchEvent(dragEvent('dragover', rightSideX, childRect.top + 2, dt));
        assert(row('child-a').classList.contains('drop-before'), 'indented top of first child drops before child');
        assert(lineLeft() === parentLineLeft + 16, 'first-child top line can indent to child depth');
        row('child-a').dispatchEvent(dragEvent('drop', rightSideX, childRect.top + 2, dt));
        await new Promise(resolve => setTimeout(resolve, 0));
        assert(calls[0][1].newParentId === 'parent', 'indented first-child gap moves under parent');
        assert(calls[1][1].relationIds.join(',') === 'r-source,r-child-a,r-child-b', 'indented first-child gap reorders above child');

        calls.length = 0;
        row('source').dispatchEvent(new DragEvent('dragend', { bubbles: true }));
        await TreeView.reload();

        const secondChildRect = row('child-b').getBoundingClientRect();
        dt = new DataTransfer();
        row('source-parent').dispatchEvent(dragEvent('dragstart', 0, 0, dt));
        row('child-b').dispatchEvent(dragEvent('dragover', rightSideX, secondChildRect.top + 2, dt));
        assert(row('child-b').classList.contains('drop-before'), 'dropping a parent note between children stays on the child lane');
        row('child-b').dispatchEvent(dragEvent('drop', rightSideX, secondChildRect.top + 2, dt));
        await new Promise(resolve => setTimeout(resolve, 0));
        assert(calls[0][1].newParentId === 'parent', 'parent note dropped between children becomes a child');
        assert(calls[1][1].relationIds.join(',') === 'r-child-a,r-source-parent,r-child-b', 'parent note reorders between the target children');

        document.body.dataset.treeDragDropSmoke = 'pass';
    } catch (error) {
        document.body.dataset.treeDragDropSmoke = 'fail';
        document.body.dataset.error = error.message;
        throw error;
    }
})();
</script>
