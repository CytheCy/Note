<!doctype html>
<meta charset="utf-8">
<link rel="stylesheet" href="../src/public/css/styles.css">
<input id="noteTitle">
<i id="noteTypeIcon"></i>
<div id="emptyState"></div>
<div id="richTextEditor" class="rich-text-editor" contenteditable="true"></div>
<div id="formatToolbar"></div>
<div id="slashMenu" hidden></div>
<script src="../src/public/js/editor.js"></script>
<script>
(() => {
    const editor = document.getElementById('richTextEditor');
    const slash = document.getElementById('slashMenu');

    function assert(condition, message) {
        if (!condition) throw new Error(message);
    }

    function putSlashIn(cell) {
        cell.textContent = '/';
        const range = document.createRange();
        range.setStart(cell.firstChild, 1);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        editor.dispatchEvent(new KeyboardEvent('keyup', { key: '/', bubbles: true }));
        assert(!slash.hidden, 'slash menu opened');
    }

    function command(id) {
        const button = slash.querySelector(`[data-block="${id}"]`);
        assert(button, `${id} exists`);
        button.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
    }

    function selectionContainer() {
        const sel = window.getSelection();
        assert(sel.rangeCount, 'selection exists');
        const node = sel.anchorNode;
        return node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
    }

    function placeCaretInText(node, offset) {
        const range = document.createRange();
        range.setStart(node.firstChild, offset);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function placeCaretIn(node) {
        const range = document.createRange();
        range.selectNodeContents(node);
        range.collapse(true);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
    }

    function pressEnter() {
        editor.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true, cancelable: true }));
    }

    function pressBackspace() {
        editor.dispatchEvent(new KeyboardEvent('keydown', { key: 'Backspace', bubbles: true, cancelable: true }));
    }

    function beforeInput(inputType, data = 'x') {
        const event = new InputEvent('beforeinput', {
            bubbles: true,
            cancelable: true,
            inputType,
            data,
        });
        editor.dispatchEvent(event);
        return event.defaultPrevented;
    }

    function mouseEvent(type, x, y) {
        return new MouseEvent(type, {
            bubbles: true,
            cancelable: true,
            clientX: x,
            clientY: y,
        });
    }

    function assertTableCommandsHidden(hidden) {
        ['table-row-below', 'table-col-right', 'table-row-delete', 'table-col-delete'].forEach(id => {
            assert(slash.querySelector(`[data-block="${id}"]`).hidden === hidden, `${id} hidden=${hidden}`);
        });
    }

    function assertTextBlock(block, message) {
        assert(block.classList.contains('editor-text-block'), `${message} is marked as a text block`);
        assert(getComputedStyle(block).cursor === 'text', `${message} shows the text cursor`);
    }

    try {
        editor.innerHTML = '<p>/</p>';
        putSlashIn(editor.querySelector('p'));
        assertTableCommandsHidden(true);
        command('code');
        const code = editor.querySelector('pre code');
        assert(code, 'code block inserted');
        assert(code.contains(selectionContainer()), 'caret placed inside code block');
        code.textContent = 'one';
        placeCaretInText(code, 3);
        pressEnter();
        assert(code.textContent === 'one', 'enter keeps code text intact');
        assert(code.querySelectorAll('br').length === 2, 'enter inserts visible code line break with trailing caret line');
        assert(getComputedStyle(code).display === 'block', 'code block owns its line box');
        assert(code.contains(selectionContainer()), 'caret stays inside code block after first enter');
        pressEnter();
        assert(code.textContent === 'one', 'second enter removes blank code line');
        assert(code.closest('pre').nextElementSibling?.tagName === 'P', 'second enter creates text line below code block');
        assert(editor.querySelectorAll('p').length === 1, 'second enter reuses existing text line below code block');
        assert(code.closest('pre').nextElementSibling.contains(selectionContainer()), 'caret exits to text line below code block');

        editor.innerHTML = '<p>/</p>';
        putSlashIn(editor.querySelector('p'));
        command('heading');
        assert(editor.querySelector('h2'), 'heading inserted');
        assert(!editor.textContent.includes('Heading'), 'heading command does not insert placeholder text');
        assert(editor.querySelector('h2').contains(selectionContainer()), 'caret placed inside heading');

        editor.innerHTML = '<p>/</p><p>After</p>';
        putSlashIn(editor.querySelector('p'));
        command('divider');
        assert(editor.children[0].classList.contains('editor-divider-block'), 'divider inserts a divider block');
        assert(editor.children[1].tagName === 'P', 'divider before content keeps following block directly after it');
        assert(editor.children.length === 2, 'divider before content does not create an extra blank line');
        assert(editor.children[1].textContent.trim() === 'After', 'divider keeps trailing content in place');
        assert(window.getSelection().anchorNode === editor, 'divider before content keeps the caret on the editor boundary');
        assert(window.getSelection().anchorOffset === 1, 'divider before content places the caret after the divider');

        editor.innerHTML = '<p>/</p>';
        putSlashIn(editor.querySelector('p'));
        command('divider');
        assert(editor.children[0].classList.contains('editor-divider-block'), 'divider at end inserts a divider block');
        assert(editor.children[0].contentEditable === 'false', 'divider block is not editable');
        assert(editor.children.length === 1, 'divider at end does not create an editable text block');
        assert(window.getSelection().anchorNode === editor, 'divider at end keeps the caret on the editor boundary');
        assert(window.getSelection().anchorOffset === 1, 'divider at end places the caret after the divider');
        const insertedDivider = editor.children[0];
        const insertedDividerRect = insertedDivider.getBoundingClientRect();
        insertedDivider.dispatchEvent(mouseEvent('mousedown', insertedDividerRect.right - 6, insertedDividerRect.top + 2));
        insertedDivider.dispatchEvent(mouseEvent('mouseup', insertedDividerRect.right - 6, insertedDividerRect.top + 2));
        assert(window.getSelection().anchorNode === editor, 'clicking divider moves selection to the editor boundary');
        assert(window.getSelection().anchorOffset === 1, 'clicking divider places the caret after the divider block');
        assert(insertedDivider.classList.contains('selected'), 'clicking divider selects the atomic divider block');
        assert(beforeInput('insertText', 'x'), 'typing at the divider boundary is blocked');
        assert(editor.children.length === 1, 'blocked divider typing does not create another block');
        pressEnter();
        assert(editor.children.length === 2, 'enter from the divider boundary creates a new text block below it');
        assert(editor.children[1].tagName === 'P', 'new text block lands below the divider');
        assert(editor.children[1].contains(selectionContainer()), 'caret moves into the new text block below the divider');
        assert(!insertedDivider.classList.contains('selected'), 'divider selection clears after entering a normal text block');

        editor.innerHTML = '<hr><p><br></p>';
        const legacyDividerRect = editor.children[0].getBoundingClientRect();
        editor.dispatchEvent(mouseEvent('mousemove', legacyDividerRect.left + 8, legacyDividerRect.top + 2));
        assert(editor.children.length === 1, 'empty legacy divider text block is removed');
        assert(editor.children[0].classList.contains('editor-divider-block'), 'normalizing the legacy text block keeps the divider block');

        editor.innerHTML = '<p>Above</p><div class="editor-divider-block" contenteditable="false"><hr></div><p>Below</p>';
        {
            const range = document.createRange();
            range.setStart(editor, 2);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
        assert(beforeInput('insertText', 'x'), 'typing at divider boundary is blocked');
        assert(editor.children.length === 3, 'typing at divider boundary does not create a new block');
        pressEnter();
        assert(editor.children.length === 4, 'enter at divider boundary creates a new text block');
        assert(editor.children[2].tagName === 'P', 'enter inserts a paragraph below the divider');
        assert(editor.children[3].tagName === 'P', 'existing following block stays after the new paragraph');
        assert(editor.children[2].contains(selectionContainer()), 'caret moves into the new paragraph below the divider');

        editor.innerHTML = '<p>Before</p><div class="editor-divider-block" contenteditable="false"><hr></div><p>After</p>';
        {
            const range = document.createRange();
            range.setStart(editor, 2);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
        pressBackspace();
        assert(editor.children.length === 2, 'backspace removes the selected divider block');
        assert(editor.children[0].textContent.trim() === 'Before', 'backspace keeps content before the divider');
        assert(editor.children[1].textContent.trim() === 'After', 'backspace keeps content after the divider');

        editor.innerHTML = '<p>/</p>';
        putSlashIn(editor.querySelector('p'));
        command('titled');
        const titled = editor.querySelector('.titled-note');
        assert(titled, 'titled note inserted');
        assert(!editor.textContent.includes('Title'), 'titled note does not insert title placeholder text');
        assert(!editor.textContent.includes('Note text'), 'titled note does not insert body placeholder text');
        assert(titled.querySelector('h2').contains(selectionContainer()), 'caret placed inside titled note title');
        titled.querySelector('h2').textContent = 'My Title';
        placeCaretInText(titled.querySelector('h2'), 8);
        pressEnter();
        assert(titled.querySelectorAll('p').length === 1, 'enter in titled note title reuses existing body line');
        assert(titled.querySelector('p').contains(selectionContainer()), 'enter in titled note title moves caret to body line');
        titled.querySelector('p').textContent = 'Body';
        const blankTitledLine = document.createElement('p');
        blankTitledLine.innerHTML = '<br>';
        titled.append(blankTitledLine);
        placeCaretIn(blankTitledLine);
        pressEnter();
        assert(titled.querySelectorAll('p').length === 1, 'enter on empty titled note body line removes that line');
        assert(titled.nextElementSibling?.tagName === 'P', 'enter on empty titled note body line exits below titled note');
        assert(titled.nextElementSibling.contains(selectionContainer()), 'caret moves below titled note body');

        editor.innerHTML = '<pre><code>one\n\nthree</code></pre><p><br></p>';
        const existingBlankLineCode = editor.querySelector('pre code');
        placeCaretInText(existingBlankLineCode, 4);
        pressEnter();
        assert(existingBlankLineCode.querySelector('br'), 'enter on existing blank code line creates a visible code line');
        assert(existingBlankLineCode.contains(selectionContainer()), 'caret stays in code from existing blank line');

        editor.innerHTML = '<table><tbody><tr><th>A</th><th>B</th></tr><tr><td>1</td><td>2</td></tr></tbody></table>';

        putSlashIn(editor.querySelector('td'));
        assertTableCommandsHidden(false);
        command('table-row-below');
        assert(editor.querySelectorAll('tr').length === 3, 'row inserted');
        assert(!editor.textContent.includes('/'), 'row command removed slash');

        putSlashIn(editor.querySelectorAll('td')[1]);
        command('table-col-right');
        assert(editor.querySelector('tr').cells.length === 3, 'column inserted');

        putSlashIn(editor.querySelectorAll('td')[3]);
        command('table-row-delete');
        assert(editor.querySelectorAll('tr').length === 2, 'row deleted');

        putSlashIn(editor.querySelectorAll('td')[1]);
        command('table-col-delete');
        assert(editor.querySelector('tr').cells.length === 2, 'column deleted');

        editor.innerHTML = '<p>/</p>';
        putSlashIn(editor.querySelector('p'));
        command('text');
        assertTextBlock(editor.children[0], 'slash regular text');

        editor.innerHTML = '<p>/</p>';
        putSlashIn(editor.querySelector('p'));
        command('table');
        assert(editor.children[0].tagName === 'TABLE', 'slash table inserts as a top-level block');
        assertTextBlock(editor.children[0], 'slash table');

        editor.innerHTML = 'Loose regular text<table><tbody><tr><td>1</td></tr></tbody></table>';
        editor.dispatchEvent(mouseEvent('mousemove', 120, 24));
        assert(editor.children[0].tagName === 'P', 'loose regular text normalizes to a paragraph block');
        assertTextBlock(editor.children[0], 'regular text');
        assertTextBlock(editor.children[1], 'table');

        editor.innerHTML = [
            '<p>Regular text</p>',
            '<ul><li>Bullet</li></ul>',
            '<ol><li>Number</li></ol>',
            '<ul class="check-list"><li><input type="checkbox"> <span>Check</span></li></ul>',
            '<table><tbody><tr><td>Cell</td></tr></tbody></table>',
            '<pre><code>Code</code></pre>',
            '<h2>Heading</h2>',
            '<hr>',
            '<section class="titled-note"><h2>Title</h2><p>Note</p></section>',
        ].join('');
        editor.dispatchEvent(mouseEvent('mousemove', 120, 24));
        [...editor.children].forEach((block, index) => {
            if (block.classList.contains('editor-divider-block')) {
                assert(block.classList.contains('editor-text-block'), 'divider is marked as a draggable block');
                assert(getComputedStyle(block).cursor === 'default', 'divider does not show the text cursor');
                return;
            }
            assertTextBlock(block, `requested block ${index + 1}`);
        });

        editor.innerHTML = '<p>Above</p><hr><p>Below</p>';
        const divider = editor.querySelector('hr');
        const dividerRect = divider.getBoundingClientRect();
        editor.dispatchEvent(mouseEvent('mousemove', dividerRect.left + 16, dividerRect.top - 6));
        const dividerHandle = document.querySelector('.block-handle');
        assert(dividerHandle && !dividerHandle.hidden, 'divider handle appears from a near-divider hover');
        const dividerHandleRect = dividerHandle.getBoundingClientRect();
        assert(dividerHandleRect.top < dividerRect.top, 'divider handle sits above the divider line');

        editor.innerHTML = '<p>Drag</p><p>Above</p><hr><p>Below</p><p>After</p>';
        const dragSource = editor.children[0];
        dragSource.dispatchEvent(mouseEvent('mousemove', 120, 24));
        const dividerDragHandle = document.querySelector('.block-handle');
        const dropLine = document.querySelector('.editor-block-drop-line');
        const dividerDropRect = editor.querySelector('hr').getBoundingClientRect();
        dividerDragHandle.dispatchEvent(mouseEvent('mousedown', 120, 24));
        window.dispatchEvent(mouseEvent('mousemove', dividerDropRect.left + 8, dividerDropRect.top - 3));
        const gapAboveTop = dropLine.getBoundingClientRect().top;
        window.dispatchEvent(mouseEvent('mousemove', dividerDropRect.left + 8, dividerDropRect.top + 8));
        assert(Math.abs(dropLine.getBoundingClientRect().top - gapAboveTop) < 1, 'space above divider maps to one drop slot');
        window.dispatchEvent(mouseEvent('mousemove', dividerDropRect.left + 8, dividerDropRect.bottom + 3));
        const gapBelowTop = dropLine.getBoundingClientRect().top;
        window.dispatchEvent(mouseEvent('mousemove', dividerDropRect.left + 8, dividerDropRect.bottom + 14));
        assert(Math.abs(dropLine.getBoundingClientRect().top - gapBelowTop) < 1, 'space below divider maps to one drop slot');
        window.dispatchEvent(mouseEvent('mouseup', dividerDropRect.left + 8, dividerDropRect.bottom + 14));

        editor.innerHTML = '<p>First</p><h2>Second</h2><section class="titled-note"><h2>Third</h2><p><br></p></section>';
        const first = editor.children[0];
        first.dispatchEvent(mouseEvent('mousemove', 120, 24));
        const handle = document.querySelector('.block-handle');
        assert(handle && !handle.hidden, 'block handle appears on hover');
        const last = editor.children[2];
        const rect = last.getBoundingClientRect();
        handle.dispatchEvent(mouseEvent('mousedown', 120, 24));
        window.dispatchEvent(mouseEvent('mousemove', rect.left + 8, rect.bottom - 4));
        assert(!document.querySelector('.editor-block-drop-line').hidden, 'drop line appears while dragging');
        window.dispatchEvent(mouseEvent('mouseup', rect.left + 8, rect.bottom - 4));
        assert(editor.children[2].tagName === 'P', 'dragged block moves after target block');
        assert(editor.children[2].textContent.trim() === 'First', 'dragged block keeps content');
        assert(document.querySelector('.editor-block-drop-line').hidden, 'drop line clears after drag');

        editor.innerHTML = '<div>Alpha</div><table><tbody><tr><td>1</td></tr></tbody></table><div>Omega</div>';
        const table = editor.querySelector('table');
        const tableRect = table.getBoundingClientRect();
        editor.dispatchEvent(mouseEvent('mousemove', tableRect.left + 8, tableRect.top + 8));
        assert(editor.children[0].tagName === 'DIV', 'leading regular text remains a direct block');
        assert(editor.children[1].tagName === 'TABLE', 'table stays a top-level block');
        assert(editor.children[2].tagName === 'DIV', 'trailing regular text remains a direct block');
        const tableHandle = document.querySelector('.block-handle');
        assert(tableHandle && !tableHandle.hidden, 'table exposes a drag handle');
        const textBlock = editor.children[0];
        const textRect = textBlock.getBoundingClientRect();
        tableHandle.dispatchEvent(mouseEvent('mousedown', 120, 24));
        window.dispatchEvent(mouseEvent('mousemove', textRect.left + 8, textRect.top + 2));
        window.dispatchEvent(mouseEvent('mouseup', textRect.left + 8, textRect.top + 2));
        assert(editor.children[0].tagName === 'TABLE', 'table can be dragged before text blocks');

        const normalizedText = editor.children[1];
        const normalizedTextRect = normalizedText.getBoundingClientRect();
        editor.dispatchEvent(mouseEvent('mousemove', normalizedTextRect.left + 8, normalizedTextRect.top + 2));
        const textHandle = document.querySelector('.block-handle');
        const trailingTextRect = editor.children[2].getBoundingClientRect();
        textHandle.dispatchEvent(mouseEvent('mousedown', normalizedTextRect.left + 8, normalizedTextRect.top + 2));
        window.dispatchEvent(mouseEvent('mousemove', trailingTextRect.left + 8, trailingTextRect.bottom - 2));
        window.dispatchEvent(mouseEvent('mouseup', trailingTextRect.left + 8, trailingTextRect.bottom - 2));
        assert(editor.children[2].tagName === 'DIV', 'regular text can be dragged as a block');
        assert(editor.children[2].textContent.trim() === 'Alpha', 'dragged text block keeps its text');

        editor.innerHTML = '<p>Direct</p><table><tbody><tr><td>1</td></tr></tbody></table><p>End</p>';
        const directBlock = editor.children[0];
        const directTarget = editor.children[2];
        const directStartRect = directBlock.getBoundingClientRect();
        const directTargetRect = directTarget.getBoundingClientRect();
        directBlock.dispatchEvent(mouseEvent('mousedown', directStartRect.left + 8, directStartRect.top + 2));
        window.dispatchEvent(mouseEvent('mousemove', directTargetRect.left + 8, directTargetRect.bottom - 2));
        window.dispatchEvent(mouseEvent('mouseup', directTargetRect.left + 8, directTargetRect.bottom - 2));
        assert(editor.children[2].textContent.trim() === 'Direct', 'regular text drags directly from the block');

        editor.innerHTML = '<p>Before</p><h2>Heading</h2><p>After</p>';
        const headingBlock = editor.children[1];
        const headingRect = headingBlock.getBoundingClientRect();
        const headingTargetRect = editor.children[2].getBoundingClientRect();
        assert(getComputedStyle(headingBlock).cursor === 'text', 'heading shows the text cursor');
        headingBlock.dispatchEvent(mouseEvent('mousedown', headingRect.left + 8, headingRect.top + 2));
        window.dispatchEvent(mouseEvent('mousemove', headingTargetRect.left + 8, headingTargetRect.bottom - 2));
        window.dispatchEvent(mouseEvent('mouseup', headingTargetRect.left + 8, headingTargetRect.bottom - 2));
        assert(editor.children[2].tagName === 'H2', 'heading drags like a text block');
        assert(editor.children[2].textContent.trim() === 'Heading', 'dragged heading keeps its text');

        document.body.dataset.editorTableSmoke = 'pass';
    } catch (error) {
        document.body.dataset.editorTableSmoke = 'fail';
        document.body.dataset.error = error.message;
        throw error;
    }
})();
</script>
